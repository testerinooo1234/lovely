<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="lovely — dark, intimate erotica stories by writers who aren't afraid of the shadows."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Sora:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>lovely</title>
    <script>
      ;(function () {
        try {
          var match = document.cookie.match(/(?:^|; )lovely_story_font=([^;]*)/)
          var id = match ? decodeURIComponent(match[1]) : 'md'
          var map = {
            xs: '0.875rem',
            sm: '0.95rem',
            md: '1.05rem',
            lg: '1.2rem',
            xl: '1.35rem',
          }
          document.documentElement.style.setProperty(
            '--story-font-size',
            map[id] || map.md,
          )
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
